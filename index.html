<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador CPID de Materiais Bíblicos</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --marrom: #4b2e1e;
      --marrom-claro: #7a4a30;
      --bege: #f4efe6;
      --dourado: #c4974f;
      --branco: #ffffff;
      --verde: #2e7d32;
      --vermelho: #b3261e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bege); color: #222; }
    header { background: linear-gradient(135deg, var(--marrom), var(--marrom-claro)); color: white; padding: 28px 20px; text-align: center; border-bottom: 5px solid var(--dourado); }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 18px; display: grid; grid-template-columns: 380px 1fr; gap: 22px; }
    .card { background: var(--branco); border-radius: 14px; padding: 22px; box-shadow: 0 5px 18px rgba(0, 0, 0, 0.10); }
    input, select, textarea { width: 100%; margin-top: 7px; padding: 12px; border: 1px solid #ddd; border-radius: 9px; }
    button { width: 100%; border: none; padding: 13px; border-radius: 9px; cursor: pointer; margin-top: 12px; font-weight: bold; }
    .btn-principal { background: var(--marrom); color: white; }
    #resultado { background: #fffdf8; border-left: 6px solid var(--dourado); padding: 22px; min-height: 500px; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <header><h1>Gerador CPID de Materiais Bíblicos</h1></header>

  <main class="container">
    <section class="card">
      <h2>Configurar Material</h2>
      <select id="tipo">
        <option value="revista_ebd">Revista de EBD</option>
        <option value="sermao">Sermão</option>
      </select>
      <input id="titulo" type="text" placeholder="Título">
      <button class="btn-principal" id="btnGerar" onclick="gerarMaterialComGemini()">Gerar Material com Gemini</button>
      <div id="status" class="status"></div>
    </section>
    <section class="card">
      <h2>Material Gerado</h2>
      <div id="resultado">O resultado aparecerá aqui...</div>
    </section>
  </main>

  <script>
    // 🔴 COLE A SUA CHAVE DA API AQUI
    const MINHA_CHAVE_API = "AIzaSyCknZ9QzlIo4RpEjdUs5D3TdwF4A-02xCM";

    function criarPromptTexto() {
      return `Escreva um material bíblico sobre: ${document.getElementById("titulo").value}`;
    }

    async function gerarMaterialComGemini() {
      const btnGerar = document.getElementById("btnGerar");
      const painel = document.getElementById("resultado");
      const statusDiv = document.getElementById("status");

      if (MINHA_CHAVE_API.includes("COLE")) {
        alert("Erro: Configure a sua chave da API no código.");
        return;
      }

      btnGerar.disabled = true;
      btnGerar.innerText = "Processando...";
      painel.innerText = "Consultando inteligência artificial...";

      try {
        // Esta é a URL exata para o Gemini 1.5 Flash
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE_API}`;
        
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: criarPromptTexto() }] }] 
          })
        });

        const result = await response.json();
        
        if (!response.ok) {
           // Isso captura erros específicos do servidor (como 404 ou 400)
           throw new Error(result.error?.message || "Erro desconhecido");
        }
        
        const texto = result.candidates[0].content.parts[0].text;
        painel.innerHTML = marked.parse(texto);
        
      } catch (err) {
        painel.innerText = "Erro: " + err.message;
        console.error("Erro detalhado:", err);
      } finally {
        btnGerar.disabled = false;
        btnGerar.innerText = "Gerar Material com Gemini";
      }
    }
  </script>
</body>
</html>
